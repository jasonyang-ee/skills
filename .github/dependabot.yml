version: 2
updates:
  # Tracked so the config records what would be updated, but capped at zero open
  # PRs: this repo is public and version-update PRs are unwanted noise (V22).
  # Dependabot security updates stay enabled via repo settings, not this file.
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
    open-pull-requests-limit: 0
    commit-message:
      prefix: ci

  # Tracks the `skills` CLI so the discovery test keeps running against a
  # current version of the tool users actually install with.
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
    open-pull-requests-limit: 0
    commit-message:
      prefix: chore
